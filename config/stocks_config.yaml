# Data download settings
download_settings:
  start_date: "2020-01-01"
  end_date: null  # null means current date
  interval: "1d"  # 1d, 5d, 1wk, 1mo, 3mo
  auto_adjust: true
  prepost: false
  threads: true
  proxy: null

# Data storage settings
#
# Environment variables for storage configuration:
#   STOCK_DATA_DIR  — Override the local data directory (absolute or relative path).
#                     Default: <project_root>/data/
#   IS_CLOUD        — Set to "true" to force cloud mode on platforms that do not set
#                     STREAMLIT_SHARING_MODE automatically (e.g. Railway, Render, Heroku).
#                     When cloud mode is active, all disk I/O is skipped and the app
#                     relies on @st.cache_data for in-session caching.
storage_settings:
  data_format: "csv"  # csv, parquet, pickle
  save_raw_data: true
  save_processed_data: true
  compression: null  # gzip, bz2, xz, zstd
